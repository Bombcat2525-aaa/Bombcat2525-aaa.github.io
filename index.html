<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site_title }} | 日本語ブログ</title>
  <meta name="description" content="{{ site_description }}">
  <meta name="robots" content="index,follow">
  <meta name="theme-color" content="#0b0f19">

  <style>
    :root{
      --bg: #0b0f19;
      --bg-soft: #121829;
      --card: #151d31;
      --text: #e6eaf2;
      --muted: #9aa4b2;
      --line: #28324a;
      --accent: #7aa2ff;
      --accent-strong: #9db9ff;
      --shadow: 0 8px 24px rgba(0,0,0,.24);
      --radius: 14px;
      --container: 1080px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
                   "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", Meiryo, sans-serif;
      background: linear-gradient(180deg, #0b0f19 0%, #0d1322 100%);
      color: var(--text);
      line-height: 1.7;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .wrap{
      width: min(100% - 2rem, var(--container));
      margin-inline: auto;
    }

    header{
      padding: 3.2rem 0 1.6rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 1.4rem;
    }

    .site-title{
      margin: 0 0 .4rem;
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      line-height: 1.25;
      letter-spacing: .01em;
    }

    .site-description{
      margin: 0;
      color: var(--muted);
      font-size: .98rem;
      max-width: 70ch;
    }

    main{
      padding: 1rem 0 2.5rem;
    }

    .section-title{
      margin: 0 0 1rem;
      font-size: 1.05rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .02em;
    }

    .posts-grid{
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      align-items: stretch;
    }

    .post-card{
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 132px;
      padding: 1rem 1rem .95rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,0)) , var(--card);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: var(--text);
      transition: transform .14s ease, border-color .14s ease, background-color .14s ease;
      will-change: transform;
    }

    .post-card:hover,
    .post-card:focus-visible{
      transform: translateY(-2px);
      border-color: #3a4b74;
      outline: none;
    }

    .post-title{
      margin: 0;
      font-size: 1rem;
      line-height: 1.45;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .post-more{
      margin-top: .9rem;
      font-size: .86rem;
      color: var(--accent);
    }

    .post-card:hover .post-more,
    .post-card:focus-visible .post-more{
      color: var(--accent-strong);
    }

    .empty{
      margin: 0;
      padding: 1rem;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      background: var(--bg-soft);
    }

    footer{
      border-top: 1px solid var(--line);
      padding: 1.2rem 0 2.4rem;
      color: var(--muted);
      font-size: .9rem;
    }

    @media (max-width: 640px){
      header{
        padding-top: 2.3rem;
      }
      .posts-grid{
        grid-template-columns: 1fr;
      }
    }

    @media (prefers-reduced-motion: reduce){
      .post-card{
        transition: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap">
      <h1 class="site-title">{{ site_title }}</h1>
      <p class="site-description">{{ site_description }}</p>
    </div>
  </header>

  <main>
    <div class="wrap">
      <h2 class="section-title">記事一覧</h2>

      <section class="posts-grid" aria-label="ブログ記事一覧">
        {% for post in posts %}
        <a class="post-card" href="{{ post.url }}" aria-label="{{ post.title }}">
          <p class="post-title">{{ post.title }}</p>
          <span class="post-more">記事を読む →</span>
        </a>
        {% endfor %}
      </section>

      {% if posts|length == 0 %}
      <p class="empty">まだ記事がありません。新しい記事を追加すると、ここに表示されます。</p>
      {% endif %}
    </div>
  </main>

  <footer>
    <div class="wrap">
      <small>&copy; {{ site_title }}. All rights reserved.</small>
    </div>
  </footer>
</body>
</html>
