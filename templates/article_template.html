<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ article_title }} | {{ site_title }}</title>
  <meta name="description" content="{{ site_description }}" />
  <meta name="robots" content="index,follow" />
  <style>
    body { font-family: "Yu Gothic UI", "Meiryo", sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; line-height: 1.9; color:#222; }
    h1, h2, h3 { line-height: 1.4; }
    .meta { color: #666; font-size: 0.95rem; margin-bottom: 1rem; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .back { margin-top: 2rem; display: inline-block; }
  </style>
</head>
<body>
  <header>
    <p><a href="../index.html">← トップへ戻る</a></p>
    <h1>{{ article_title }}</h1>
    <p class="meta">公開日: {{ article_date }}</p>
  </header>

  <main>
    {{ article_html | safe }}
  </main>

  <footer>
    <a class="back" href="../index.html">記事一覧へ戻る</a>
  </footer>
</body>
</html>
