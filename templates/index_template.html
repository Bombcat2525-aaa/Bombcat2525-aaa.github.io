<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ site_title }}</title>
  <meta name="description" content="{{ site_description }}" />
  <meta name="robots" content="index,follow" />
  <style>
    body { font-family: "Yu Gothic UI", "Meiryo", sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; line-height: 1.8; color:#222; }
    h1 { margin-bottom: 0.2rem; }
    .desc { color:#666; margin-bottom: 1.5rem; }
    ul { list-style: none; padding: 0; }
    li { border-bottom: 1px solid #eee; padding: 0.8rem 0; }
    .date { color:#777; font-size: 0.9rem; margin-right: 0.8rem; }
    a { color: #0b57d0; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <h1>{{ site_title }}</h1>
    <p class="desc">{{ site_description }}</p>
  </header>

  <main>
    <h2>記事一覧</h2>
    <ul>
      {% for post in posts %}
      <li>
        <span class="date">{{ post.date }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ul>
  </main>
</body>
</html>
